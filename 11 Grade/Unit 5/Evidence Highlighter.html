.confetti { position:fixed; width:10px; height:14px; top:-20px; z-index:300; pointer-events:none; border-radius:2px; }
.settings-btn { background:rgba(255,255,255,.15); border:none; color:#fff; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.settings-btn:hover { background:rgba(255,255,255,.25); }
.settings-panel { position:absolute; top:100%; right:12px; margin-top:6px; background:var(--card); border-radius:var(--radius-sm); padding:12px; min-width:200px; box-shadow:var(--shadow-md); display:none; z-index:150; }
.settings-panel.visible { display:block; }
.settings-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-size:12px; color:var(--text); }
.toggle { position:relative; width:36px; height:20px; background:var(--border); border-radius:99px; cursor:pointer; transition:background .2s; }
.toggle.on { background:var(--accent); }

@media (min-width:480px) {
  .app-header h1 { font-size:18px; }

</style>

<script>
(function(){
  var DATA = JSON.parse(document.getElementById("appData").textContent);
  var passage = { biro: DATA.biro, crum: DATA.crum };
  var questions = DATA.questions;
  var state = {
    currentQ: 0, scoreCorrect: 0, scoreWrong: 0, points: 0,
    streak: 0, maxStreak: 0, userAnswers: [], answered: false,
    timeLeft: 30, timerId: null, startTime: 0,
    settings: loadSettings(), wrongPool: null
  };
  var LS_BEST = "mcg_evhi_best_v1";
  var LS_SETTINGS = "mcg_evhi_settings_v1";

  function loadSettings(){
    try { var raw = localStorage.getItem(LS_SETTINGS); if (raw) return Object.assign({timer:true,sound:true,hints:true}, JSON.parse(raw)); } catch(e){}
    return { timer:true, sound:true, hints:true };
  }
  function saveSettings(){ try { localStorage.setItem(LS_SETTINGS, JSON.stringify(state.settings)); } catch(e){} }
  function $(id){ return document.getElementById(id); }

  var audioCtx = null;
  function beep(freq, dur, type){
    if (!state.settings.sound) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = audioCtx.createOscillator(); var gain = audioCtx.createGain();
      osc.type = type || "sine"; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e){}
  }
  function playCorrect(){ beep(660, .15, "triangle"); setTimeout(function(){ beep(880, .2, "triangle"); }, 120); }
  function playWrong(){ beep(220, .25, "sawtooth"); }
  function playTick(){ beep(1000, .04, "square"); }

  function currentList(){ return state.wrongPool || questions.map(function(_, i){ return i; }); }
  function currentQIndex(){ return currentList()[state.currentQ]; }
  function currentQData(){ return questions[currentQIndex()]; }
  function totalInRun(){ return currentList().length; }

  function renderFullPassage(){
    var biroHtml = passage.biro.map(function(s){ return s.text; }).join(" ");
    var crumHtml = passage.crum.map(function(s){ return s.text; }).join(" ");
    $("fullPassageBody").innerHTML =
      '<div class="passage-section"><div class="section-label">László Bíró</div><p>' + biroHtml + '</p></div>' +
      '<div class="passage-section"><div class="section-label">George Crum</div><p>' + crumHtml + '</p></div>';
  }

  function renderChallenge(){
    state.answered = false;
    if (state.currentQ >= totalInRun()) { renderCompleted(); return; }
    var q = currentQData();
    function makeSpans(arr){
      var offset = (arr === passage.biro) ? 0 : passage.biro.length;
      return arr.map(function(s, idx){
        var keyNum = offset + idx + 1;
        var hint = state.settings.hints && keyNum <= 9 ? '<span class="key-hint">' + keyNum + '</span>' : '';
        return '<span class="sentence" id="mini_' + s.id + '" data-sid="' + s.id + '" data-key="' + keyNum + '">' + hint + s.text + '</span> ';
      }).join("");
    }
    var timerHtml = state.settings.timer ? '<span class="timer-chip" id="timerChip">&#9201; <span id="timerValue">30</span>s</span>' : '';
    var hintText = state.settings.hints
      ? 'Tap a sentence, or press a number key <kbd>1</kbd>-<kbd>9</kbd>. No evidence? Press <kbd>N</kbd>.'
      : 'Tap the sentence that proves or disproves this statement.';
    $("challengeContainer").innerHTML =
      '<div class="challenge-card">' +
        '<div class="challenge-header">' +
          '<span class="q-badge">Question ' + (state.currentQ + 1) + '</span>' +
          '<span class="q-counter">' + (state.currentQ + 1) + ' of ' + totalInRun() + '</span>' +
          timerHtml +
        '</div>' +
        '<div class="statement-area">' +
          '<div class="statement-label">Statement to evaluate</div>' +
          '<div class="statement-text">' + q.statement + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="instruction-box">' +
        '<div class="instruction-icon">&#128070;</div>' +
        '<div class="instruction-text"><strong>Your task:</strong> ' + hintText + '</div>' +
      '</div>' +
      '<div class="mini-passage-card">' +
        '<div class="mini-passage-header"><span>&#128214; Reading Passage</span><span class="tap-hint">Tap a sentence</span></div>' +
        '<div class="mini-passage-body" id="miniPassageBody">' +
          '<div style="margin-bottom:12px;"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#0077b6;margin-bottom:6px;">László Bíró</div>' + makeSpans(passage.biro) + '</div>' +
          '<div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#0077b6;margin-bottom:6px;">George Crum</div>' + makeSpans(passage.crum) + '</div>' +
        '</div>' +
      '</div>' +
      '<button class="not-in-text-btn" id="notInTextBtn" type="button">&#128683; Not in the text' + (state.settings.hints ? ' <kbd>N</kbd>' : '') + '</button>';

    var spans = document.querySelectorAll("#miniPassageBody .sentence");
    for (var i = 0; i < spans.length; i++) {
      spans[i].addEventListener("click", function(e){ selectSentence(e.currentTarget.getAttribute("data-sid")); });
    }
    $("notInTextBtn").addEventListener("click", selectNotInText);
    updateUI();
    startTimer();
  }

  function startTimer(){
    stopTimer();
    state.startTime = Date.now();
    if (!state.settings.timer) return;
    state.timeLeft = 30;
    var chip = $("timerChip"); var val = $("timerValue");
    if (val) val.textContent = state.timeLeft;
    if (chip) chip.classList.remove("warning");
    state.timerId = setInterval(function(){
      state.timeLeft--;
      if (val) val.textContent = state.timeLeft;
      if (state.timeLeft <= 5) { if (chip) chip.classList.add("warning"); if (state.timeLeft > 0) playTick(); }
      if (state.timeLeft <= 0) {
        stopTimer();
        if (!state.answered) {
          state.answered = true;
          var q = currentQData();
          var ce = $("mini_" + q.correctSentence); if (ce) ce.classList.add("correct-highlight");
          state.streak = 0;
          recordAnswer(false, "Time ran out.");
          showFeedback(false, false, true, 0);
        }
      }
    }, 1000);
  }
  function stopTimer(){ if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
  function timeBonus(){ var el = (Date.now() - state.startTime) / 1000; return Math.max(0, Math.round(5 - (el / 6))); }

  function selectSentence(sid){
    if (state.answered) return;
    state.answered = true; stopTimer();
    var q = currentQData();
    var isCorrect = (sid === q.correctSentence);
    var selEl = $("mini_" + sid);
    if (selEl) {
      selEl.classList.add("selected");
      setTimeout(function(){ selEl.classList.remove("selected"); selEl.classList.add(isCorrect ? "correct-highlight" : "wrong-highlight"); }, 250);
    }
    if (!isCorrect) {
      setTimeout(function(){ var ce = $("mini_" + q.correctSentence); if (ce) ce.classList.add("correct-highlight"); }, 350);
    }
    var earned = 0;
    if (isCorrect) {
      state.streak++;
      if (state.streak > state.maxStreak) state.maxStreak = state.streak;
      earned = 10 + timeBonus() + Math.min(state.streak - 1, 5) * 2;
      state.points += earned;
      playCorrect();
    } else { state.streak = 0; playWrong(); }
    recordAnswer(isCorrect, isCorrect ? "Great job!" : "Wrong sentence selected.");
    showFeedback(isCorrect, false, false, earned);
  }

  function selectNotInText(){
    if (state.answered) return;
    state.answered = true; stopTimer();
    var q = currentQData();
    $("notInTextBtn").classList.add("selected");
    setTimeout(function(){ var ce = $("mini_" + q.correctSentence); if (ce) ce.classList.add("correct-highlight"); }, 250);
    state.streak = 0; playWrong();
    recordAnswer(false, "The evidence IS in the text. Look for the highlighted sentence.");
    showFeedback(false, true, false, 0);
  }

  function recordAnswer(correct, note){
    if (correct) state.scoreCorrect++; else state.scoreWrong++;
    state.userAnswers.push({ qIndex: currentQIndex(), correct: correct, note: note });
    updateUI();
  }

  function showFeedback(isCorrect, isNotInText, isTimeout, earned){
    var q = currentQData();
    $("feedbackHeader").className = "feedback-card-header " + (isCorrect ? "correct" : (isNotInText || isTimeout ? "info" : "wrong"));
    $("feedbackIcon").textContent = isCorrect ? "✓" : (isNotInText ? "?" : (isTimeout ? "⏰" : "✗"));
    $("feedbackTitle").textContent = isCorrect ? "Correct!" : (isNotInText ? "Not quite" : (isTimeout ? "Time's up!" : "Incorrect"));
    $("feedbackSubtitle").textContent = isCorrect ? "You found the right evidence." : "Let us look at the correct answer.";
    var isTrue = q.result === "True";
    var pill = $("feedbackVerdict");
    pill.className = "verdict-pill " + (isTrue ? "true" : "false");
    pill.textContent = "Statement is " + (isTrue ? "TRUE" : "FALSE");
    var pts = $("feedbackPoints");
    if (isCorrect && earned) {
      pts.textContent = "⭐ +" + earned + " points" + (state.streak > 1 ? " (streak " + state.streak + ")" : "");
      pts.style.display = "block";
    } else { pts.style.display = "none"; }
    $("feedbackExplanation").textContent = q.explanation;
    $("feedbackEvidence").innerHTML = '<strong>\u{1F4CC} Key Evidence</strong>' + q.evidence;
    var isLast = state.currentQ >= totalInRun() - 1;
    $("nextBtnText").textContent = isLast ? "See Results" : "Next Question";
    $("feedbackOverlay").classList.add("visible");
  }

  function nextQuestion(){
    $("feedbackOverlay").classList.remove("visible");
    state.currentQ++;
    if (state.currentQ >= totalInRun()) { renderCompleted(); renderResults(); switchTab("results"); }
    else { renderChallenge(); }
  }

  function renderCompleted(){
    $("challengeContainer").innerHTML =
      '<div class="completed-banner"><div class="completed-banner-icon">\u{1F389}</div>' +
      '<div><h3>All questions completed!</h3><p>Check the Results tab to see your score.</p></div></div>';
  }

  function renderResults(){
    if (state.userAnswers.length === 0) {
      $("resultsContainer").innerHTML = '<div class="locked-msg"><div style="font-size:40px;margin-bottom:12px;">\u{1F512}</div><h3>No results yet</h3><p>Complete the challenge to see your results here.</p></div>';
      return;
    }
    var total = questions.length;
    var pct = Math.round((state.scoreCorrect / total) * 100);
    var grade, trophy;
    if (pct >= 90) { grade = "Excellent!"; trophy = "\u{1F3C6}"; }
    else if (pct >= 70) { grade = "Well Done!"; trophy = "\u{1F948}"; }
    else if (pct >= 50) { grade = "Good Effort"; trophy = "\u{1F949}"; }
    else { grade = "Keep Practicing"; trophy = "\u{1F4D6}"; }
    var best = 0;
    try { best = parseInt(localStorage.getItem(LS_BEST) || "0", 10) || 0; } catch(e){}
    if (state.points > best) { try { localStorage.setItem(LS_BEST, state.points); } catch(e){} best = state.points; }
    var wrongIndices = [];
    for (var i = 0; i < state.userAnswers.length; i++) { if (!state.userAnswers[i].correct) wrongIndices.push(state.userAnswers[i].qIndex); }
    var items = state.userAnswers.map(function(a){
      var q = questions[a.qIndex]; var isC = a.correct;
      return '<div class="result-item">' +
        '<div class="result-icon ' + (isC ? 'c' : 'w') + '">' + (isC ? '✅' : '❌') + '</div>' +
        '<div><div class="result-statement">' + q.statement + '</div>' +
        '<div class="result-note">' + (isC ? 'Correct evidence selected.' : 'Incorrect — ' + a.note) + '</div></div>' +
      '</div>';
    }).join("");
    var retryBtn = wrongIndices.length > 0
      ? '<button class="retry-wrong-btn" id="retryWrongBtn" type="button">\u{1F501} Retry ' + wrongIndices.length + ' missed question' + (wrongIndices.length > 1 ? 's' : '') + '</button>'
      : '';
    $("resultsContainer").innerHTML =
      '<div class="results-hero">' +
        '<div class="results-trophy">' + trophy + '</div>' +
        '<div class="results-score-big">' + state.scoreCorrect + '/' + total + '</div>' +
        '<div class="results-score-label">Questions Answered Correctly</div>' +
        '<div class="results-grade">' + grade + '</div>' +
        '<div class="results-stats">' +
          '<div class="results-stat"><div class="results-stat-value">⭐ ' + state.points + '</div><div class="results-stat-label">Points</div></div>' +
          '<div class="results-stat"><div class="results-stat-value">\u{1F525} ' + state.maxStreak + '</div><div class="results-stat-label">Best Streak</div></div>' +
          '<div class="results-stat"><div class="results-stat-value">\u{1F947} ' + best + '</div><div class="results-stat-label">All-Time Best</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="results-breakdown"><div class="results-breakdown-header">Question Breakdown</div>' + items + '</div>' +
      retryBtn +
      '<button class="restart-btn" id="restartBtn" type="button">\u{1F504} Try Again (All ' + total + ')</button>';
    $("restartBtn").addEventListener("click", function(){ restartQuiz(null); });
    var rw = $("retryWrongBtn"); if (rw) rw.addEventListener("click", function(){ restartQuiz(wrongIndices); });
    if (pct === 100) fireConfetti();
  }

  function restartQuiz(onlyIndices){
    state.currentQ = 0; state.scoreCorrect = 0; state.scoreWrong = 0;
    state.points = 0; state.streak = 0; state.maxStreak = 0;
    state.userAnswers = []; state.answered = false;
    state.wrongPool = (onlyIndices && onlyIndices.length > 0) ? onlyIndices.slice() : null;
    $("feedbackOverlay").classList.remove("visible");
    updateUI(); renderChallenge(); switchTab("challenge");
  }

  function updateUI(){
    $("scoreCorrect").textContent = state.scoreCorrect;
    $("scoreWrong").textContent = state.scoreWrong;
    $("pointsValue").textContent = state.points;
    var pct = ((state.scoreCorrect + state.scoreWrong) / totalInRun()) * 100;
    $("progressFill").style.width = pct + "%";
    $("qBadge").textContent = Math.min(state.currentQ + 1, totalInRun()) + "/" + totalInRun();
    var sb = $("streakBadge");
    if (state.streak >= 2) {
      sb.style.display = "flex"; $("streakCount").textContent = state.streak;
      if (state.streak >= 3) sb.classList.add("hot"); else sb.classList.remove("hot");
    } else { sb.style.display = "none"; sb.classList.remove("hot"); }
  }

  function switchTab(tab){
    var tabs = document.querySelectorAll(".tab-btn");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
    var panels = document.querySelectorAll(".panel");
    for (var j = 0; j < panels.length; j++) panels[j].classList.remove("active");
    $("tab-" + tab).classList.add("active");
    $("panel-" + tab).classList.add("active");
    if (tab === "results") renderResults();
  }

  function fireConfetti(){
    var colors = ["#0077b6","#10b981","#f59e0b","#ef4444","#00b4d8","#fde68a"];
    for (var i = 0; i < 60; i++) {
      (function(){
        var c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        var startRot = Math.random() * 360;
        c.style.transform = "rotate(" + startRot + "deg)";
        document.body.appendChild(c);
        var dur = 2500 + Math.random() * 2000;
        var drift = (Math.random() - .5) * 200;
        c.animate(
          [
            { transform: "rotate(" + startRot + "deg) translate(0,0)", opacity: 1 },
            { transform: "rotate(" + (Math.random() * 720) + "deg) translate(" + drift + "px, 100vh)", opacity: .8 }
          ],
          { duration: dur, easing: "cubic-bezier(.2,.8,.3,1)" }
        );
        setTimeout(function(){ c.remove(); }, dur);
      })();
    }
  }

  function applyToggleUI(){
    $("toggleTimer").classList.toggle("on", !!state.settings.timer);
    $("toggleSound").classList.toggle("on", !!state.settings.sound);
    $("toggleHints").classList.toggle("on", !!state.settings.hints);
  }

  document.addEventListener("DOMContentLoaded", function(){
    applyToggleUI();
    var tabs = document.querySelectorAll(".tab-btn");
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener("click", function(e){ switchTab(e.currentTarget.getAttribute("data-tab")); });
    }
    $("nextBtn").addEventListener("click", nextQuestion);
    $("settingsBtn").addEventListener("click", function(e){ e.stopPropagation(); $("settingsPanel").classList.toggle("visible"); });
    document.addEventListener("click", function(e){
      if (!$("settingsPanel").contains(e.target) && e.target !== $("settingsBtn")) $("settingsPanel").classList.remove("visible");
    });
    var toggles = document.querySelectorAll(".toggle");
    for (var k = 0; k < toggles.length; k++) {
      toggles[k].addEventListener("click", function(e){
        var key = e.currentTarget.getAttribute("data-setting");
        state.settings[key] = !state.settings[key];
        applyToggleUI(); saveSettings();
        if (key === "timer" || key === "hints") renderChallenge();
      });
    }
    document.addEventListener("keydown", function(e){
      if ($("feedbackOverlay").classList.contains("visible")) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); nextQuestion(); }
        return;
      }
      if (state.answered) return;
      if (/^[1-9]$/.test(e.key)) {
        var num = parseInt(e.key, 10);
        var span = document.querySelector('#miniPassageBody .sentence[data-key="' + num + '"]');
        if (span) selectSentence(span.getAttribute("data-sid"));
      } else if (e.key === "n" || e.key === "N") { selectNotInText(); }
    });
    renderFullPassage();
    renderChallenge();
  });
})();
</script>
</body>
</html>
